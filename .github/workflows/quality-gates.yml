name: Quality Gates

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend
        run: dotnet restore Eatopia/Eatopia.sln

      - name: Test backend
        run: dotnet test Eatopia/Eatopia.sln --configuration Release --no-restore -v minimal

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend-src/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-src
        run: npm ci

      - name: Run unit tests
        working-directory: frontend-src
        run: npm run test:ci

      - name: Build frontend
        working-directory: frontend-src
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: frontend-src
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend-src
        env:
          PLAYWRIGHT_BUNDLED: "1"
        run: npm run e2e
